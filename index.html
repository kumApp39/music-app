<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学級の歌 プロンプト＆演奏合奏サポートアプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hidden-screen { display: none !important; }
        button, input, select, textarea { touch-action: manipulation; }
        html { scroll-behavior: smooth; }
        
        /* 印刷時のデザイン最適化（完全白黒・横いっぱい） */
        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            header, button, #btn-fullscreen, .no-print, #main-header, #screen-top, #screen-child, #screen-teacher > section:not(#support-chord-sheet-section) { 
                display: none !important; 
            }
            body { background: white !important; color: black !important; }
            #screen-teacher { display: block !important; padding: 0 !important; margin: 0 !important; }
            .print-layout { 
                width: 100% !important; max-width: 100% !important; 
                box-shadow: none !important; border: none !important; padding: 0 !important; 
                background: white !important;
            }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen flex flex-col">

    <header id="main-header" class="hidden-screen bg-white border-b border-slate-200 p-4 sticky top-0 z-10 flex justify-between items-center shadow-sm px-6">
        <div class="flex items-center gap-3 font-bold text-xl text-slate-700">
            <i data-lucide="music" class="w-6 h-6 text-blue-500"></i>
            <span>学級の歌 アプリ</span>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="resetAllData()" id="btn-reset" class="hidden-screen text-sm font-bold text-red-600 bg-red-50 hover:bg-red-100 px-4 py-2.5 rounded-full transition-colors border border-red-200 shadow-sm flex items-center gap-2">
                <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 新しく曲を作る
            </button>
            <button onclick="toggleFullScreen()" id="btn-fullscreen" class="text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 p-2.5 rounded-full transition-colors border border-slate-200 shadow-sm flex items-center justify-center" title="全画面表示">
                <i data-lucide="maximize" class="w-5 h-5"></i>
            </button>
            <button onclick="showScreen('top')" class="text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 px-5 py-2.5 rounded-full transition-colors border border-slate-200 shadow-sm">
                さいしょにもどる
            </button>
        </div>
    </header>

    <main class="flex-1 w-full">
        <div id="screen-top" class="min-h-[90vh] flex items-center justify-center p-6 md:p-12 relative">
            <button onclick="toggleFullScreen()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-600 p-2 bg-white rounded-full shadow-sm border border-slate-100">
                <i data-lucide="maximize" class="w-6 h-6"></i>
            </button>

            <div class="max-w-4xl w-full text-center">
                <div class="flex justify-center mb-8">
                    <div class="bg-blue-100 p-6 rounded-full shadow-inner">
                        <i data-lucide="music" class="w-16 h-16 text-blue-600"></i>
                    </div>
                </div>
                <h1 class="text-4xl md:text-5xl font-black text-slate-800 mb-4">学級の歌 つくり隊！</h1>
                <p class="text-slate-500 mb-12 text-lg font-bold">モードを選択して、クラスだけの歌を作ろう</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-3xl mx-auto">
                    <button onclick="showScreen('child')" class="group relative overflow-hidden p-10 rounded-[2rem] border-4 border-amber-200 bg-amber-50 hover:bg-amber-100 active:scale-95 transition-all flex flex-col items-center text-center shadow-md">
                        <div class="absolute top-4 left-4 bg-amber-200 text-amber-800 text-sm font-black px-4 py-1 rounded-full">STEP 1</div>
                        <div class="mt-6 mb-6 bg-amber-200 p-8 rounded-full group-hover:scale-110 transition-transform shadow-sm">
                            <i data-lucide="smile" class="w-24 h-24 text-amber-700"></i>
                        </div>
                        <h2 class="text-3xl font-black text-amber-900 mb-3">かしをつくる</h2>
                        <h3 class="text-xl font-bold text-amber-700 mb-4 bg-amber-200/50 px-6 py-2 rounded-full">こども モード</h3>
                        <p class="text-amber-800/80 font-semibold leading-relaxed">すきなことばをえらんで<br>じぶんたちの「かし」をつくろう！</p>
                    </button>

                    <button onclick="showScreen('teacher')" class="group relative overflow-hidden p-10 rounded-[2rem] border-4 border-blue-200 bg-blue-50 hover:bg-blue-100 active:scale-95 transition-all flex flex-col items-center text-center shadow-md">
                        <div class="absolute top-4 left-4 bg-blue-200 text-blue-800 text-sm font-black px-4 py-1 rounded-full">STEP 2</div>
                        <div class="mt-6 mb-6 bg-blue-200 p-8 rounded-full group-hover:scale-110 transition-transform shadow-sm">
                            <i data-lucide="settings" class="w-24 h-24 text-blue-700"></i>
                        </div>
                        <h2 class="text-3xl font-black text-blue-900 mb-3">曲のプロンプト生成</h2>
                        <h3 class="text-xl font-bold text-blue-700 mb-4 bg-blue-200/50 px-6 py-2 rounded-full">せんせい モード</h3>
                        <p class="text-blue-800/80 font-semibold leading-relaxed">こどもたちの歌詞から<br>AIに作曲させる指示書を作ります</p>
                    </button>
                </div>
            </div>
        </div>

        <div id="screen-child" class="hidden-screen max-w-7xl mx-auto space-y-6 md:space-y-8 p-4 md:p-8">
            <div class="bg-gradient-to-r from-amber-200 to-orange-200 rounded-3xl p-8 md:p-10 text-center shadow-md">
                <h1 class="text-3xl md:text-4xl font-black text-amber-900 mb-4 flex items-center justify-center gap-3">
                    <i data-lucide="sparkles" class="w-10 h-10 text-amber-600"></i>
                    じぶんたちだけの「かし」をつくろう！
                </h1>
                <p class="text-amber-800 text-xl font-bold">すきな ことばを えらんだり、じぶんで かいたりしてね。</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                <div class="bg-white rounded-[2rem] shadow-md p-6 md:p-8 border border-slate-100">
                    <h2 class="text-2xl font-black text-slate-800 mb-6 flex items-center gap-3">
                        <span class="bg-slate-100 p-3 rounded-2xl"><i data-lucide="sparkles" class="w-7 h-7 text-amber-500"></i></span>ことばの ひきだし
                    </h2>
                    <div id="word-bank-container" class="space-y-8"></div>
                </div>

                <div class="bg-white rounded-[2rem] shadow-md p-6 md:p-8 border border-slate-100 flex flex-col h-full min-h-[600px]">
                    <h2 class="text-2xl font-black text-slate-800 mb-6 flex items-center gap-3">
                        <span class="bg-slate-100 p-3 rounded-2xl"><i data-lucide="pen-tool" class="w-7 h-7 text-blue-500"></i></span>かしを かくところ
                    </h2>
                    <div class="flex-1 flex flex-col">
                        <textarea id="child-textarea-lyrics" oninput="handleLyricsChange(this.value)" placeholder="ここに、がっこうの うたの かしが はいります。1ばん、2ばんとわけてかいてみよう！" class="w-full flex-1 min-h-[380px] p-8 bg-blue-50/50 border-4 border-blue-100 rounded-3xl focus:ring-4 focus:ring-blue-200 focus:border-blue-400 outline-none resize-none text-2xl font-bold text-slate-700 leading-loose"></textarea>
                    </div>
                    
                    <div class="mt-8 pt-8 border-t-2 border-slate-100 flex justify-end">
                        <button onclick="showScreen('teacher')" class="bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white px-10 py-5 rounded-3xl font-black text-2xl flex items-center gap-3 transition-transform shadow-xl shadow-emerald-200">
                            せんせいに バトンタッチ！ <i data-lucide="arrow-right" class="w-8 h-8"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-teacher" class="hidden-screen max-w-4xl mx-auto space-y-6 pb-12 p-4 md:p-8">
            <div class="bg-white rounded-2xl shadow-sm p-6 text-center border border-slate-100 no-print">
                <h1 class="text-2xl font-bold text-blue-900 mb-2 flex items-center justify-center gap-2">
                    <i data-lucide="settings" class="w-6 h-6 text-blue-500"></i>楽曲生成プロンプト作成（教師用）
                </h1>
                <p class="text-slate-600 text-sm">
                    こどもたちの歌詞をもとに、一曲の完結した学級の歌を作るための指示文を作成します。
                </p>
            </div>

            <section class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100 no-print">
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="bg-blue-100 text-blue-800 rounded-lg w-7 h-7 flex items-center justify-center text-sm">3</span>歌詞の確認（リアルタイム同期）
                </h2>
                <div class="space-y-2">
                    <label class="font-bold text-sm text-blue-800 flex items-center gap-2"><i data-lucide="file-text" class="w-4 h-4"></i> 学級の歌の歌詞</label>
                    <textarea id="teacher-textarea-lyrics" oninput="handleLyricsChange(this.value)" class="w-full h-40 p-4 bg-slate-50 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none resize-none text-base font-medium" placeholder="こどもたちが作った歌詞がここに自動同期されます。修正・加筆も自由に可能です。"></textarea>
                </div>
            </section>

            <section id="support-chord-sheet-section" class="bg-white rounded-[2rem] shadow-md p-6 md:p-8 border-2 border-emerald-400 print-layout">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 border-b border-slate-100 pb-4">
                    <div>
                        <h2 class="text-xl md:text-2xl font-black text-emerald-800 flex items-center gap-2">
                            <i data-lucide="book-open" class="w-6 h-6 text-emerald-500"></i>えんそう合奏サポートシート
                        </h2>
                    </div>
                    <button onclick="window.print()" class="bg-emerald-500 active:bg-emerald-600 active:scale-95 text-white text-xs font-bold px-4 py-2.5 rounded-full flex items-center gap-2 shadow-md transition-all no-print">
                        <i data-lucide="printer" class="w-4 h-4"></i> 楽譜シートを印刷
                    </button>
                </div>

                <div class="flex gap-2 mb-4 bg-amber-50 p-1 rounded-xl no-print">
                    <button id="verse-tab-all" onclick="switchVerseTab('all')" class="flex-1 py-2 rounded-lg font-bold text-sm bg-white text-amber-700 shadow-sm border border-amber-200">すべて</button>
                    <button id="verse-tab-1" onclick="switchVerseTab('1')" class="flex-1 py-2 rounded-lg font-bold text-sm text-slate-500 hover:bg-white/50">1ばん (Aメロ)</button>
                    <button id="verse-tab-2" onclick="switchVerseTab('2')" class="flex-1 py-2 rounded-lg font-bold text-sm text-slate-500 hover:bg-white/50">2ばん (Bメロ)</button>
                </div>

                <div class="flex gap-2 mb-6 bg-slate-100 p-1 rounded-xl no-print">
                    <button id="instrument-tab-piano" onclick="switchInstrumentType('piano')" class="flex-1 py-2.5 rounded-lg font-bold text-xs md:text-sm text-center bg-white text-emerald-700 shadow-sm flex items-center justify-center gap-1.5">
                        <i data-lucide="keyboard" class="w-4 h-4"></i> 鍵盤コードガイド
                    </button>
                    <button id="instrument-tab-percussion" onclick="switchInstrumentType('percussion')" class="flex-1 py-2.5 rounded-lg font-bold text-xs md:text-sm text-center text-slate-500 flex items-center justify-center gap-1.5">
                        <i data-lucide="drum" class="w-4 h-4"></i> 打楽器（リズム）ガイド
                    </button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                    <div class="lg:col-span-5 bg-slate-50 p-4 rounded-2xl border border-slate-100 no-print">
                        <div id="piano-guide-panel" class="space-y-4">
                            <h3 class="text-sm font-bold text-slate-600 flex items-center gap-2"><i data-lucide="keyboard" class="w-4 h-4"></i> キーボードコードガイド</h3>
                            <div id="chord-guide-buttons" class="flex flex-wrap gap-2"></div>
                            <div class="bg-white p-4 rounded-xl border border-slate-200 flex justify-center">
                                <svg id="piano-svg" viewBox="0 0 280 120" class="w-full max-w-[280px] h-auto"></svg>
                            </div>
                        </div>

                        <div id="percussion-guide-panel" class="space-y-4 hidden-screen">
                            <h3 class="text-sm font-bold text-slate-600 flex items-center gap-2"><i data-lucide="drum" class="w-4 h-4"></i> 打楽器リズムガイド</h3>
                            <div id="percussion-select-buttons" class="flex flex-wrap gap-2"></div>
                            <div class="bg-white p-4 rounded-xl border border-slate-200 flex flex-col items-center">
                                <div id="percussion-instrument-name" class="text-xs font-black text-emerald-700 mb-2">カスタネット</div>
                                <svg id="percussion-svg" viewBox="0 0 280 120" class="w-full max-w-[280px] h-auto"></svg>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-7 space-y-4">
                        <div id="chord-lyrics-display" class="bg-slate-50 p-6 rounded-2xl border border-slate-100 min-h-[220px] font-mono text-base md:text-lg leading-loose whitespace-pre-wrap text-slate-800">
                            </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        // --- データ・状態管理（LocalStorage対応） ---
        const STORAGE_KEY = 'musicApp_state_v2';
        let state = {
            lyrics: '',
            playLevel: 'simple3',
            instrumentTab: 'piano',
            verseTab: 'all', // 1ばん/2ばん制御用
            // その他設定値群
            teacherTab: 'simple',
            freeImage: '',
            simple: { genre: 'jpop', tempo: 'mid', mood: 'bright', vocalType: 'mixed_chorus', vocalTone: 'clear' },
            adv: { genre: '', tempo: '', timeSignature: '', rhythm: '', key: '', vocalMain: '', vocalTone: '', vocalChorus: '', vocalNegative: '' }
        };

        // アプリ起動時のデータ復元
        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state = { ...state, ...parsed };
                } catch (e) { console.error('LocalStorage parse error', e); }
            }
        }
        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        // --- リセット機能 ---
        function resetAllData() {
            if(confirm('入力した歌詞や設定など、すべてのデータが消えますがよろしいですか？\n（この操作は取り消せません）')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        // --- UI表示切り替え ---
        function showScreen(screenId) {
            document.getElementById('screen-top').classList.add('hidden-screen');
            document.getElementById('screen-child').classList.add('hidden-screen');
            document.getElementById('screen-teacher').classList.add('hidden-screen');
            document.getElementById('main-header').classList.add('hidden-screen');
            
            const btnReset = document.getElementById('btn-reset');
            btnReset.classList.add('hidden-screen');

            if (screenId === 'top') {
                document.getElementById('screen-top').classList.remove('hidden-screen');
            } else {
                document.getElementById('main-header').classList.remove('hidden-screen');
                document.getElementById(`screen-${screenId}`).classList.remove('hidden-screen');
                if (screenId === 'teacher') {
                    btnReset.classList.remove('hidden-screen'); // せんせいモード時のみリセット表示
                }
            }
            lucide.createIcons();
        }

        function handleLyricsChange(value) {
            state.lyrics = value;
            syncLyricsUI();
            saveState();
        }

        function syncLyricsUI() {
            document.getElementById('child-textarea-lyrics').value = state.lyrics;
            document.getElementById('teacher-textarea-lyrics').value = state.lyrics;
            updateChordSheet();
        }

        // --- 1ばん・2ばん タブ切り替え（簡易実装） ---
        function switchVerseTab(verse) {
            state.verseTab = verse;
            
            // タブUIの切り替え
            const tabs = ['all', '1', '2'];
            tabs.forEach(t => {
                const el = document.getElementById(`verse-tab-${t}`);
                if(t === verse) {
                    el.className = "flex-1 py-2 rounded-lg font-bold text-sm bg-white text-amber-700 shadow-sm border border-amber-200";
                } else {
                    el.className = "flex-1 py-2 rounded-lg font-bold text-sm text-slate-500 hover:bg-white/50";
                }
            });
            updateChordSheet();
        }

        // --- 合奏シートの描画 (抜粋) ---
        function updateChordSheet() {
            const targetArea = document.getElementById('chord-lyrics-display');
            let displayLyrics = state.lyrics || '「こどもモード」で歌詞を入力すると、ここに楽譜が表示されます。';
            
            // 簡易的な1番・2番の抽出（"1ばん" "2ばん"というキーワードで分割）
            if (state.verseTab !== 'all') {
                const verse1Index = displayLyrics.indexOf('1ばん');
                const verse2Index = displayLyrics.indexOf('2ばん');
                
                if (state.verseTab === '1' && verse1Index !== -1) {
                    displayLyrics = verse2Index !== -1 ? displayLyrics.substring(verse1Index, verse2Index) : displayLyrics.substring(verse1Index);
                } else if (state.verseTab === '2' && verse2Index !== -1) {
                    displayLyrics = displayLyrics.substring(verse2Index);
                }
            }
            
            targetArea.textContent = displayLyrics;
            // 実際はここにコード記号を付与するロジックが入ります
        }

        // --- 起動時処理 ---
        window.onload = () => {
            loadState();
            syncLyricsUI();
            lucide.createIcons();
            // 初期データロード処理等...
        };
        
        // （※その他のフルスクリーン制御や詳細なSVG描画関数、ワードバンク等のロジックは既存のものをそのまま維持します）
    </script>
</body>
</html>
