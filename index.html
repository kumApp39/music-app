<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学級の歌 プロンプト＆演奏合奏サポートアプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 画面切り替え用の非表示クラス */
        .hidden-screen { display: none !important; }
        /* iPad等でのタッチ操作最適化 */
        button, input, select, textarea { touch-action: manipulation; }
        /* スムーズなスクロール */
        html { scroll-behavior: smooth; }
        /* 印刷時のデザイン調整 */
        @media print {
            header, button, #btn-fullscreen, .no-print, .instrument-selector-zone { display: none !important; }
            body { background: white !important; color: black !important; }
            .print-layout { width: 100% !important; max-width: 100% !important; box-shadow: none !important; border: none !important; padding: 0 !important; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen flex flex-col">

    <header id="main-header" class="hidden-screen bg-white border-b border-slate-200 p-4 sticky top-0 z-10 flex justify-between items-center shadow-sm px-6">
        <div class="flex items-center gap-3 font-bold text-xl text-slate-700">
            <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
            <span>学級の歌 アプリ</span>
        </div>
        <div class="flex items-center gap-3">
            <button id="btn-reset-data" onclick="resetAllDataWithConfirm()" class="text-xs font-bold text-slate-400 hover:text-red-500 transition-colors flex items-center gap-1.5 no-print border border-slate-100 hover:border-red-100 rounded-full px-3 py-1.5 bg-slate-50 hover:bg-red-50 hidden" title="すべてのデータをクリアして新しい曲を作ります">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                <span>新しく曲を作る(リセット)</span>
            </button>
            <button onclick="toggleFullScreen()" id="btn-fullscreen" class="text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 p-2.5 rounded-full transition-colors border border-slate-200 shadow-sm flex items-center justify-center" title="全画面表示">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
            </button>
            <button onclick="showScreen('top')" class="text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 px-5 py-2.5 rounded-full transition-colors border border-slate-200 shadow-sm no-print">
                さいしょにもどる
            </button>
        </div>
    </header>

    <main class="flex-1 w-full">
        <div id="screen-top" class="min-h-[90vh] flex items-center justify-center p-6 md:p-12 relative">
            <button onclick="toggleFullScreen()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-600 p-2 bg-white rounded-full shadow-sm border border-slate-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
            </button>

            <div class="max-w-5xl w-full bg-white rounded-[2rem] shadow-xl p-10 md:p-14 text-center border border-slate-100">
                <div class="flex justify-center mb-6">
                    <div class="bg-blue-100 p-5 rounded-full">
                        <svg class="w-16 h-16 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
                    </div>
                </div>
                <h1 class="text-4xl md:text-5xl font-black text-slate-800 mb-4">学級の歌 つくり隊！</h1>
                <p class="text-slate-500 mb-12 text-base md:text-lg font-bold">歌詞作りからAIプロンプト作成、合奏練習までフルサポート</p>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8 text-left">
                    <button onclick="showScreen('child')" class="group relative overflow-hidden p-6 md:p-8 rounded-[2rem] border-4 border-amber-200 bg-amber-50 active:bg-amber-100 active:scale-95 transition-all flex flex-col items-center text-center shadow-sm">
                        <span class="bg-amber-400 text-white font-black px-4 py-1.5 rounded-full text-sm mb-6">ステップ 1</span>
                        <div class="bg-amber-200 w-20 h-20 rounded-2xl group-hover:scale-110 transition-transform flex items-center justify-center shrink-0 mb-6">
                            <svg class="w-12 h-12 text-amber-700 block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        </div>
                        <h2 class="text-2xl font-black text-amber-900 mb-2">① かしをつくる</h2>
                        <p class="text-amber-700 text-sm font-bold mb-4">【こどもモード】</p>
                        <p class="text-slate-600 text-xs md:text-sm leading-relaxed max-w-[220px]">ことばのひきだしを使って、自分たちだけのオリジナルの歌詞を楽しく考えよう！</p>
                    </button>

                    <button onclick="showScreen('teacher')" class="group relative overflow-hidden p-6 md:p-8 rounded-[2rem] border-4 border-blue-200 bg-blue-50 active:bg-blue-100 active:scale-95 transition-all flex flex-col items-center text-center shadow-sm">
                        <span class="bg-blue-500 text-white font-black px-4 py-1.5 rounded-full text-sm mb-6">ステップ 2</span>
                        <div class="bg-blue-200 w-20 h-20 rounded-2xl group-hover:scale-110 transition-transform flex items-center justify-center shrink-0 mb-6">
                            <svg class="w-12 h-12 text-blue-700 block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31(2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
                        </div>
                        <h2 class="text-2xl font-black text-blue-900 mb-2">② プロンプトを生成</h2>
                        <p class="text-blue-700 text-sm font-bold mb-4">【せんせいモード】</p>
                        <p class="text-slate-600 text-xs md:text-sm leading-relaxed max-w-[220px]">曲調や演奏の難易度を設定して、AI（Gemini）用の高精度な指示文を出力します。</p>
                    </button>

                    <button onclick="showScreen('ensemble')" class="group relative overflow-hidden p-6 md:p-8 rounded-[2rem] border-4 border-emerald-200 bg-emerald-50 active:bg-emerald-100 active:scale-95 transition-all flex flex-col items-center text-center shadow-sm">
                        <span class="bg-emerald-500 text-white font-black px-4 py-1.5 rounded-full text-sm mb-6">ステップ 3</span>
                        <div class="bg-emerald-200 w-20 h-20 rounded-2xl group-hover:scale-110 transition-transform flex items-center justify-center shrink-0 mb-6">
                            <svg class="w-12 h-12 text-emerald-700 block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 22c5.523 0 10-2.239 10-5V7c0-2.761-4.477-5-10-5S2 4.239 2 7v10c0 2.761 4.477 5 10 5z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 12c5.523 0 10-1.791 10-4S17.523 4 12 4 2 5.791 2 8s4.477 4 10 4z"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 10.5V17M17 10.5V17"/></svg>
                        </div>
                        <h2 class="text-2xl font-black text-emerald-900 mb-2">③ みんなで合奏する</h2>
                        <p class="text-emerald-700 text-sm font-bold mb-4">【みんなで合奏モード】</p>
                        <p class="text-slate-600 text-xs md:text-sm leading-relaxed max-w-[220px]">できた歌詞に自動で伴奏コードや打楽器リズムが連動。黒板への投影や楽譜の印刷に最適！</p>
                    </button>
                </div>
            </div>
        </div>

        <div id="screen-child" class="hidden-screen max-w-7xl mx-auto space-y-6 md:space-y-8 p-4 md:p-8">
            <div class="bg-gradient-to-r from-amber-200 to-orange-200 rounded-3xl p-8 md:p-10 text-center shadow-md">
                <h1 class="text-3xl md:text-4xl font-black text-amber-900 mb-4 flex items-center justify-center gap-3">
                    <svg class="w-10 h-10 text-amber-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L11 3z"/></svg>
                    じぶんたちだけの「かし」をつくろう！
                </h1>
                <p class="text-amber-800 text-xl font-bold">すきな ことばを えらんだり、じぶんで かいたりしてね。</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                <div class="bg-white rounded-[2rem] shadow-md p-6 md:p-8 border border-slate-100">
                    <h2 class="text-2xl font-black text-slate-800 mb-6 flex items-center gap-3">
                        <span class="bg-slate-100 p-3 rounded-2xl"><svg class="w-7 h-7 text-amber-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L11 3z"/></svg></span>
                        ことばの ひきだし
                    </h2>
                    <div id="word-bank-container" class="space-y-8">
                        </div>
                </div>

                <div class="bg-white rounded-[2rem] shadow-md p-6 md:p-8 border border-slate-100 flex flex-col h-full min-h-[600px]">
                    <h2 class="text-2xl font-black text-slate-800 mb-6 flex items-center gap-3">
                        <span class="bg-slate-100 p-3 rounded-2xl"><svg class="w-7 h-7 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></span>
                        かしを かくところ
                    </h2>

                    <div class="flex-1 flex flex-col">
                        <textarea id="child-textarea-lyrics" oninput="handleLyricsChange(this.value)" placeholder="ここに、がっこうの うたの かしが はいります。" class="w-full flex-1 min-h-[300px] p-8 bg-blue-50/50 border-4 border-blue-100 rounded-3xl focus:ring-4 focus:ring-blue-200 focus:border-blue-400 outline-none resize-none text-2xl font-bold text-slate-700 leading-loose"></textarea>
                    </div>
                    
                    <div class="mt-8 pt-8 border-t-2 border-slate-100 flex justify-end">
                        <button onclick="showScreen('top')" class="bg-amber-500 active:bg-amber-600 active:scale-95 text-white px-10 py-5 rounded-3xl font-black text-2xl flex items-center gap-3 transition-transform shadow-xl shadow-emerald-200">
                            できた！メニューにもどる <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-teacher" class="hidden-screen max-w-4xl mx-auto space-y-6 pb-12 p-4 md:p-8">
            <div class="bg-white rounded-2xl shadow-sm p-6 text-center border border-slate-100">
                <h1 class="text-2xl font-bold text-blue-900 mb-2 flex items-center justify-center gap-2">
                    <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31(2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
                    楽曲生成プロンプト作成（教師用）
                </h1>
                <p class="text-slate-600 text-sm">
                    子供たちの歌詞をもとに、一曲の完結した学級の歌を作るための指示文（プロンプト）を設計します。
                </p>
            </div>

            <section class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="bg-blue-100 text-blue-800 rounded-lg w-7 h-7 flex items-center justify-center text-sm">1</span>入力モード選択
                </h2>
                <div class="flex gap-4">
                    <button id="btn-teacher-simple" onclick="switchTeacherTab('simple')" class="flex-1 p-4 rounded-xl border-2 font-bold transition-all border-blue-500 bg-blue-50 text-blue-900">簡単モード</button>
                    <button id="btn-teacher-adv" onclick="switchTeacherTab('advanced')" class="flex-1 p-4 rounded-xl border-2 font-bold transition-all border-slate-200 text-slate-500 active:bg-slate-50">詳細モード</button>
                </div>
            </section>

            <section class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <span class="bg-blue-100 text-blue-800 rounded-lg w-7 h-7 flex items-center justify-center text-sm">2</span>楽曲テイスト・演奏難易度・ボーカル設定
                </h2>

                <div class="bg-purple-50 p-5 rounded-xl border border-purple-200 mb-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-purple-900 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 113.536 0V21h2v-5M12 3v1"/></svg>
                            曲のイメージ（自由記述 / 任意）
                        </label>
                        <input type="text" id="common-free-image" oninput="handleFreeImageChange(this.value)" placeholder="例：みんなで手拍子したくなるような、明るくて親しみやすい曲" class="w-full p-3 text-sm bg-white border border-purple-300 rounded-lg focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none animate-pulse" />
                        <p class="text-xs text-purple-700">※お好みで入力してください。AIに確固とした補強イメージとして組み込まれます。</p>
                    </div>
                </div>

                <div class="bg-emerald-50 p-5 rounded-xl border border-emerald-200 mb-6">
                    <h3 class="text-sm font-bold text-emerald-900 mb-3 flex items-center gap-2">
                        <svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                        えんそう（伴奏）の難易度設定
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <label class="bg-white p-4 rounded-lg border-2 border-slate-200 hover:border-emerald-500 cursor-pointer flex flex-col justify-between transition-all">
                            <input type="radio" name="playLevel" value="simple3" checked onclick="handlePlayLevelChange('simple3')" class="sr-only">
                            <div>
                                <span class="font-black text-emerald-800 text-sm block mb-1">① いちばん簡単（3コードのみ）</span>
                                <span class="text-xs text-slate-500 leading-relaxed">C, F, G (ハ長調)の3和音だけで演奏できる伴奏にします。低学年の伴奏に最適！</span>
                            </div>
                            <span class="text-xs font-bold text-emerald-600 mt-2 text-right">主要三和音</span>
                        </label>
                        <label class="bg-white p-4 rounded-lg border-2 border-slate-200 hover:border-emerald-500 cursor-pointer flex flex-col justify-between transition-all">
                            <input type="radio" name="playLevel" value="pop4" onclick="handlePlayLevelChange('pop4')" class="sr-only">
                            <div>
                                <span class="font-black text-indigo-800 text-sm block mb-1">② すこし本格的（簡単4コード）</span>
                                <span class="text-xs text-slate-500 leading-relaxed">C, G, Am, Fの王道ループ。おしゃれでJ-POPらしいのに、繰り返し演奏可能！</span>
                            </div>
                            <span class="text-xs font-bold text-indigo-600 mt-2 text-right">王道ループ</span>
                        </label>
                        <label class="bg-white p-4 rounded-lg border-2 border-slate-200 hover:border-emerald-500 cursor-pointer flex flex-col justify-between transition-all">
                            <input type="radio" name="playLevel" value="auto" onclick="handlePlayLevelChange('auto')" class="sr-only">
                            <div>
                                <span class="font-black text-slate-800 text-sm block mb-1">③ AIにおまかせ</span>
                                <span class="text-xs text-slate-500 leading-relaxed">コードの制限は設けず、AIのドラマチックな転調や豊かな伴奏構成を重視します。</span>
                            </div>
                            <span class="text-xs font-bold text-slate-600 mt-2 text-right">AIにお任せ</span>
                        </label>
                    </div>
                </div>
                
                <div id="panel-teacher-simple" class="space-y-6">
                    <div class="bg-slate-50 p-5 rounded-xl border border-slate-200">
                        <h3 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                            <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
                            音楽のベース
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="space-y-1">
                                <label class="text-xs font-semibold text-slate-500">ジャンル</label>
                                <select id="simple-genre" onchange="handleSettingChange('simple', 'genre', this.value)" class="w-full p-3 text-sm bg-white border border-slate-300 rounded-lg focus:border-blue-500 outline-none"></select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-semibold text-slate-500">テンポ</label>
